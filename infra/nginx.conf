events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    
    # Rozmiar chunków - krytyczne przy pobieraniu 10-50GB
    chunked_transfer_encoding on;

    # Nielimitowany rozmiar dla wgrywania ogromnych plików skanów
    client_max_body_size 0;

    # Utrzymywanie długich połączeń dla dużych plików
    keepalive_timeout 3600; # Zwiększone z 65 dla obsługi wolniejszych klientów
    proxy_read_timeout 3600;
    proxy_connect_timeout 3600;
    proxy_send_timeout 3600;
    
    server {
        listen 80;
        server_name localhost;

        # Frontend (opcjonalnie, jeśli serwowany stąd, na razie tylko proxy do api/plików)
        location / {
            proxy_pass http://host.docker.internal:5173; # Proxy do dev serwera Vite
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_request_buffering off; # Wyłączenie buforowania Nginxa dla streamingu
        }
        
        location /auth/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Wewnętrzny endpoint chroniony używany przez X-Accel-Redirect
        location /protected_media/ {
            internal; # Dostępne tylko przez Nginx redirect, brak dostępu z zewnątrz
            alias /protected_media/;
            
            # Dodanie obsługi dla Range (wznawianie pobierania)
            # Nginx robi to automatycznie, jeśli nie wyłączymy tego dla statycznych plików
        }
    }
}
